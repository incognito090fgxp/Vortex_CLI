[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "vortex-db-cli"
version = "0.1.0"
description = "Интерактивный CLI для PostgreSQL"
dependencies = [
    "psycopg[binary]",
    "python-dotenv==1.0.0",
    "rich>=10.11.0",
    "prompt_toolkit>=3.0.0"
]

[project.scripts]
vortex = "vortex_db:main"
